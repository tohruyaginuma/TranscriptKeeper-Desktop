name: Release DMG

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-dmg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-dmg:
    runs-on: macos-latest
    env:
      VITE_API_ROOT: ${{ vars.VITE_API_ROOT }}
      VITE_WEB_ROOT: ${{ vars.VITE_WEB_ROOT }}
      VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm exec tsc -- --noEmit

      - name: Validate release environment
        run: |
          required_vars=(
            VITE_API_ROOT
            VITE_WEB_ROOT
            VITE_FIREBASE_API_KEY
            VITE_FIREBASE_AUTH_DOMAIN
            VITE_FIREBASE_PROJECT_ID
            VITE_FIREBASE_STORAGE_BUCKET
            VITE_FIREBASE_MESSAGING_SENDER_ID
            VITE_FIREBASE_APP_ID
          )

          for key in "${required_vars[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required GitHub Actions variable: $key"
              exit 1
            fi
          done

      - name: Build DMG
        run: npx electron-forge make --platform=darwin --arch=arm64 --targets=@electron-forge/maker-dmg

      - name: Publish DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Unsigned DMG build for `${{ github.ref_name }}`.

            Commit: `${{ github.sha }}`

            If macOS blocks the app on first launch, open it from Finder with
            right-click > Open, or run:
            `xattr -dr com.apple.quarantine "/Applications/Transcript Keeper.app"`
          prerelease: ${{ contains(github.ref_name, '-') }}
          overwrite_files: true
          files: out/make/*.dmg
